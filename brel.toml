provider = "github"
default_branch = "main"

[release_pr]

[release_pr.format_overrides]
"Cargo.lock" = "toml"

[release_pr.version_updates]
"Cargo.toml" = ["package.version"]
"Cargo.lock" = ["package[name=livreur].version"]


[release_pr.changelog]
enabled = true
provider = "git-cliff"

[release_pr.tagging]
enabled = true
tag_template = "v{version}"
